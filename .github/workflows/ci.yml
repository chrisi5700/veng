name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# A newer push to the same ref cancels an in-flight run for it.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: ${{ matrix.label }}
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          # Canonical run: full suite on lavapipe + lcov coverage report.
          - label: "Coverage (GCC · lavapipe)"
            preset: ci-coverage
            cc: gcc-14
            cxx: g++-14
            coverage: true
          # The safety gate from CLAUDE.md/README, now enforced in CI.
          - label: "ASan+UBSan (GCC · lavapipe)"
            preset: llm-vcpkg
            cc: gcc-14
            cxx: g++-14
            # The GPU driver/loader leak via libdbus at exit (see run_test.sh); UBSan
            # aborts on the first error since llm-vcpkg sets -fno-sanitize-recover=all.
            test_env: "ASAN_OPTIONS=detect_leaks=0 UBSAN_OPTIONS=print_stacktrace=1:halt_on_error=1"
          # Second compiler, warnings-as-errors. dev-vcpkg has no sanitizers; the -D
          # override turns the warning gate on without editing the preset.
          - label: "Clang -Werror (lavapipe)"
            preset: dev-vcpkg
            cc: clang-18
            cxx: clang++-18
            cmake_extra: "-D TREAT_WARNINGS_AS_ERRORS=ON"
          # ThreadSanitizer over the Vulkan-free reactive core only (the threaded
          # scheduler). core_only builds + runs just those test binaries directly.
          - label: "TSan (reactive core)"
            preset: tsan-vcpkg
            cc: gcc-14
            cxx: g++-14
            core_only: true
            test_env: "TSAN_OPTIONS=halt_on_error=1"
    env:
      # vcpkg is cloned at a pinned commit (the one veng is developed against) so CI
      # resolves the exact dependency versions that build locally.
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      VCPKG_COMMIT: 22d9c655dc24ad24c6cac27607005e619ce46740
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.cache/vcpkg
      # Slang is not a vcpkg port; it is fetched from the Khronos release page. The
      # glibc-2.27 build is the most portable across runner images.
      SLANG_VERSION: "2026.10"
      SLANG_PREFIX: ${{ github.workspace }}/.slang
      DEBIAN_FRONTEND: noninteractive
      # vcpkg builds ports with this compiler; CMake configure uses it for veng.
      CC: ${{ matrix.cc }}
      CXX: ${{ matrix.cxx }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install system packages
        run: |
          set -euo pipefail
          sudo apt-get update
          # Vulkan loader/headers + lavapipe (software ICD for headless test runs);
          # GLFW build dependencies (vcpkg builds glfw3 from source); lcov for coverage.
          # Both toolchains are installed on every lane; the matrix's CC/CXX select one.
          sudo apt-get install -y --no-install-recommends \
            ninja-build pkg-config lcov ca-certificates curl tar \
            gcc-14 g++-14 clang-18 \
            libvulkan-dev vulkan-tools libvulkan1 mesa-vulkan-drivers \
            xorg-dev libxkbcommon-dev libwayland-dev wayland-protocols libwayland-bin \
            libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libgl1-mesa-dev \
            autoconf automake libtool
          # Pin the Vulkan loader to the lavapipe ICD so tests run on the software
          # rasterizer (GitHub runners have no GPU).
          lvp="$(ls /usr/share/vulkan/icd.d/lvp_icd*.json 2>/dev/null | head -1 || true)"
          if [ -n "$lvp" ]; then
            echo "VK_ICD_FILENAMES=$lvp" >> "$GITHUB_ENV"
            echo "VK_DRIVER_FILES=$lvp"  >> "$GITHUB_ENV"
            echo "lavapipe ICD: $lvp"
          else
            echo "::warning::lavapipe ICD not found under /usr/share/vulkan/icd.d"
          fi

      - name: Install CMake + Ninja (recent)
        uses: lukka/get-cmake@latest

      - name: Install Slang ${{ env.SLANG_VERSION }}
        run: |
          set -euo pipefail
          mkdir -p "$SLANG_PREFIX"
          url="https://github.com/shader-slang/slang/releases/download/v${SLANG_VERSION}/slang-${SLANG_VERSION}-linux-x86_64-glibc-2.27.tar.gz"
          echo "Downloading $url"
          curl -fsSL --retry 3 "$url" -o /tmp/slang.tar.gz
          tar -xzf /tmp/slang.tar.gz -C "$SLANG_PREFIX"
          cfg="$(find "$SLANG_PREFIX" \( -name 'slangConfig.cmake' -o -name 'slang-config.cmake' \) | head -1)"
          lib="$(find "$SLANG_PREFIX" -name 'libslang.so*' | head -1)"
          if [ -z "$cfg" ] || [ -z "$lib" ]; then
            echo "::error::slang cmake config or libslang.so not found after extraction"
            find "$SLANG_PREFIX" -maxdepth 3 | head -60
            exit 1
          fi
          echo "slang_DIR=$(dirname "$cfg")"                  >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$(dirname "$lib"):${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"
          echo "slang config dir: $(dirname "$cfg")"
          echo "slang library dir: $(dirname "$lib")"

      - name: Cache vcpkg binary archives
        uses: actions/cache@v5
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: vcpkg-${{ runner.os }}-${{ matrix.cc }}-${{ env.VCPKG_COMMIT }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ matrix.cc }}-${{ env.VCPKG_COMMIT }}-
            vcpkg-${{ runner.os }}-${{ matrix.cc }}-

      - name: Set up vcpkg @ pinned commit
        run: |
          set -euo pipefail
          mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE"
          if [ ! -d "$VCPKG_ROOT/.git" ]; then
            git clone https://github.com/microsoft/vcpkg "$VCPKG_ROOT"
          fi
          git -C "$VCPKG_ROOT" fetch --depth 1 origin "$VCPKG_COMMIT"
          git -C "$VCPKG_ROOT" checkout --detach "$VCPKG_COMMIT"
          "$VCPKG_ROOT/bootstrap-vcpkg.sh" -disableMetrics

      - name: Configure
        run: cmake --preset ${{ matrix.preset }} -D "slang_DIR=$slang_DIR" ${{ matrix.cmake_extra }}

      # Full build for every lane except TSan, which only needs the Vulkan-free core
      # test binaries (running TSan over the GPU suite just surfaces Mesa-driver noise).
      - name: Build (full)
        if: ${{ !matrix.core_only }}
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Build (reactive core)
        if: ${{ matrix.core_only }}
        run: cmake --build --preset ${{ matrix.preset }} --target SchedulerTests GraphTests TemporalTests

      - name: Test (lavapipe software Vulkan)
        if: ${{ !matrix.core_only }}
        run: ${{ matrix.test_env }} ctest --test-dir build/${{ matrix.preset }} --output-on-failure -j 2

      # TSan lane: run the core test binaries directly (ctest test names are per-CASE,
      # so a name regex would be brittle — the executables are the stable handle).
      - name: Test (reactive core under TSan)
        if: ${{ matrix.core_only }}
        run: |
          set -euo pipefail
          for t in SchedulerTests GraphTests TemporalTests; do
            echo "::group::$t"
            ${{ matrix.test_env }} "build/${{ matrix.preset }}/tests/$t"
            echo "::endgroup::"
          done

      - name: Coverage (lcov)
        if: ${{ matrix.coverage && always() }}
        run: |
          set -uo pipefail
          bd=build/${{ matrix.preset }}
          # The build uses g++-14, so lcov must read .gcda with the matching gcov — the
          # runner's default `gcov` is gcc-13's and silently produces an empty report.
          gcov_tool="${CC/gcc/gcov}"   # gcc-14 -> gcov-14
          # lcov 2.x is strict; tolerate the usual gcov/source mismatches (mirrors run_test.sh).
          ig="--ignore-errors=mismatch,negative,unused,gcov,source,empty,inconsistent,range"
          if ! lcov --capture --directory "$bd" --gcov-tool "$gcov_tool" \
               --output-file "$bd/coverage.info" $ig; then
            echo "::warning::lcov capture failed; no coverage report produced"
            exit 0
          fi
          lcov --remove "$bd/coverage.info" \
            '*/vcpkg_installed/*' '/usr/*' '*/tests/*' '*/bench/*' \
            '*/example/*' "$SLANG_PREFIX/*" \
            --output-file "$bd/coverage.filtered.info" $ig
          lcov --list "$bd/coverage.filtered.info" $ig | tee "$bd/coverage.txt"
          genhtml "$bd/coverage.filtered.info" --output-directory "$bd/html" $ig || true
          {
            echo "### Coverage (veng libraries)"
            echo '```'
            tail -n 25 "$bd/coverage.txt"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage report
        if: ${{ matrix.coverage && always() }}
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: |
            build/ci-coverage/coverage.filtered.info
            build/ci-coverage/coverage.txt
            build/ci-coverage/html
          if-no-files-found: warn
